<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="44" fill="url(#bg)"/>
  <!-- Decorative math symbols -->
  <g fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <!-- plus top-left -->
    <g transform="translate(24, 42)">
      <line x1="10" y1="0" x2="10" y2="20"/>
      <line x1="0" y1="10" x2="20" y2="10"/>
    </g>
    <!-- times top-right -->
    <g transform="translate(158, 44)">
      <line x1="0" y1="0" x2="16" y2="16"/>
      <line x1="16" y1="0" x2="0" y2="16"/>
    </g>
    <!-- divide bottom-left -->
    <g transform="translate(28, 144)">
      <circle cx="9" cy="2" r="2.5" fill="#FFFFFF" stroke="none"/>
      <line x1="0" y1="9" x2="18" y2="9"/>
      <circle cx="9" cy="16" r="2.5" fill="#FFFFFF" stroke="none"/>
    </g>
    <!-- equals bottom-right -->
    <g transform="translate(156, 140)">
      <line x1="0" y1="0" x2="18" y2="0"/>
      <line x1="0" y1="12" x2="18" y2="12"/>
    </g>
    <!-- minus top-center -->
    <line x1="84" y1="28" x2="108" y2="28" stroke-width="4"/>
  </g>
  <!-- Face circle -->
  <circle cx="96" cy="100" r="56" fill="url(#face)"/>
  <!-- Rosy cheeks -->
  <ellipse cx="66" cy="112" rx="9" ry="6" fill="#F9A8D4" opacity="0.8"/>
  <ellipse cx="126" cy="112" rx="9" ry="6" fill="#F9A8D4" opacity="0.8"/>
  <!-- Eyes -->
  <circle cx="76" cy="92" r="7" fill="#1F2937"/>
  <circle cx="116" cy="92" r="7" fill="#1F2937"/>
  <circle cx="78" cy="90" r="2.5" fill="#FFFFFF"/>
  <circle cx="118" cy="90" r="2.5" fill="#FFFFFF"/>
  <!-- Smile -->
  <path d="M 74 118 Q 96 138 118 118" fill="none" stroke="#1F2937" stroke-width="5" stroke-linecap="round"/>
  <!-- Party star on top -->
  <path d="M96 30 L100 42 L112 42 L102 50 L106 62 L96 54 L86 62 L90 50 L80 42 L92 42 Z" fill="#FDE047" stroke="#F59E0B" stroke-width="2" stroke-linejoin="round"/>
</svg>
