services:
  postgres:
    image: postgres:16-alpine
    container_name: continha-magica-postgres
    environment:
      POSTGRES_USER: aventura
      POSTGRES_PASSWORD: aventura
      POSTGRES_DB: continha_magica
    ports:
      - "5432:5432"
    volumes:
      - continha-magica-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aventura -d continha_magica"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  continha-magica-postgres-data:
